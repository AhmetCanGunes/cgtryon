<!DOCTYPE html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cgTRYON : AI Factory</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              /* Brand - CSS variable tabanlı */
              primary: "var(--primary)",
              "primary-light": "var(--primary-light)",
              "primary-dim": "var(--primary-dim)",
              secondary: "var(--secondary)",
              accent: "var(--accent)",
              "accent-dim": "var(--accent-dim)",

              /* Mode-aware accent */
              "mode-accent": "var(--mode-accent)",
              "mode-accent-dim": "var(--mode-accent-dim)",

              /* Background scale */
              "bg-base": "var(--bg-base)",
              "bg-surface": "var(--bg-surface)",
              "bg-elevated": "var(--bg-elevated)",

              /* Border scale */
              "border-subtle": "var(--border-subtle)",
              "border-default": "var(--border-default)",
              "border-strong": "var(--border-strong)",

              /* Semantic */
              success: "var(--success)",
              warning: "var(--warning)",
              error: "var(--error)",
              info: "var(--info)",

              /* Legacy aliases (geriye uyumluluk) */
              "background-light": "#E9EEF2",
              "background-dark": "var(--bg-base)",
              "card-dark": "var(--glass-bg)",
              "border-dark": "var(--border-subtle)"
            },
            backgroundImage: {
              'grid-pattern': "radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px)",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              DEFAULT: "12px",
              'xl': '20px'
            },
          },
        },
      };
    </script>
    <style>
      /* ===== CSS VARIABLE TOKEN SYSTEM ===== */
      :root {
        /* Background scale */
        --bg-base: #09090F;
        --bg-surface: #0F1117;
        --bg-elevated: #161B26;

        /* Border scale */
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-default: rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.16);

        /* Text scale */
        --text-primary: #F0F2F5;
        --text-secondary: #94A3B8;
        --text-muted: #4B5563;

        /* Brand colors */
        --primary: #2B7A9E;
        --primary-light: #3B9CC2;
        --primary-dim: #1E5A75;
        --secondary: #6BB8DB;
        --accent: #22D3EE;
        --accent-dim: rgba(34, 211, 238, 0.15);

        /* Mode accent (defaults to primary) */
        --mode-accent: #2B7A9E;
        --mode-accent-dim: rgba(43, 122, 158, 0.15);
        --mode-accent-glow: rgba(43, 122, 158, 0.30);

        /* Semantic colors */
        --success: #34D399;
        --warning: #FBBF24;
        --error: #F87171;
        --info: #3B9CC2;

        /* Glass tokens */
        --glass-bg: rgba(15, 17, 23, 0.70);
        --glass-bg-elevated: rgba(22, 27, 38, 0.70);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 20px;
      }

      /* ===== MODE-BASED ACCENT OVERRIDES ===== */
      [data-mode="mens"] {
        --mode-accent: #3B82F6;
        --mode-accent-dim: rgba(59, 130, 246, 0.15);
        --mode-accent-glow: rgba(59, 130, 246, 0.30);
      }

      [data-mode="womens"] {
        --mode-accent: #A78BFA;
        --mode-accent-dim: rgba(167, 139, 250, 0.15);
        --mode-accent-glow: rgba(167, 139, 250, 0.30);
      }

      [data-mode="ad"] {
        --mode-accent: #22D3EE;
        --mode-accent-dim: rgba(34, 211, 238, 0.15);
        --mode-accent-glow: rgba(34, 211, 238, 0.30);
      }

      [data-mode="prompt"] {
        --mode-accent: #94A3B8;
        --mode-accent-dim: rgba(148, 163, 184, 0.15);
        --mode-accent-glow: rgba(148, 163, 184, 0.30);
      }

      [data-mode="jewelry"] {
        --mode-accent: #F59E0B;
        --mode-accent-dim: rgba(245, 158, 11, 0.15);
        --mode-accent-glow: rgba(245, 158, 11, 0.30);
      }

      [data-mode="studio"] {
        --mode-accent: #2B7A9E;
        --mode-accent-dim: rgba(43, 122, 158, 0.15);
        --mode-accent-glow: rgba(43, 122, 158, 0.30);
      }

      /* ===== BASE STYLES ===== */
      body {
        font-family: 'Inter', sans-serif;
      }

      /* ===== PREMIUM GLASS SYSTEM ===== */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
        border: 1px solid var(--glass-border);
      }

      .glass-sidebar {
        background: linear-gradient(
          180deg,
          rgba(15, 17, 23, 0.88) 0%,
          rgba(15, 17, 23, 0.78) 100%
        );
        backdrop-filter: blur(20px) saturate(1.6);
        -webkit-backdrop-filter: blur(20px) saturate(1.6);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          inset 0 1px 0 0 rgba(255, 255, 255, 0.04),
          4px 0 24px -4px rgba(0, 0, 0, 0.3);
      }

      .glass-header {
        background: linear-gradient(
          180deg,
          rgba(15, 17, 23, 0.82) 0%,
          rgba(15, 17, 23, 0.72) 100%
        );
        backdrop-filter: blur(20px) saturate(1.6);
        -webkit-backdrop-filter: blur(20px) saturate(1.6);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow:
          inset 0 -1px 0 0 rgba(255, 255, 255, 0.03),
          0 4px 24px -4px rgba(0, 0, 0, 0.3);
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(22, 27, 38, 0.80) 0%,
          rgba(15, 17, 23, 0.60) 100%
        );
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 8px 32px -8px rgba(0, 0, 0, 0.4);
      }

      .glass-popup {
        background: rgba(22, 27, 38, 0.92);
        backdrop-filter: blur(24px) saturate(1.8);
        -webkit-backdrop-filter: blur(24px) saturate(1.8);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 16px 48px -8px rgba(0, 0, 0, 0.5);
      }

      /* Grid background */
      .grid-bg {
        background-size: 30px 30px;
        background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      }

      /* ===== GLOW & EFFECTS ===== */
      .glow-purple, .glow-primary {
        box-shadow: 0 0 20px var(--mode-accent-glow);
      }

      .neon-glow {
        box-shadow: 0 0 15px var(--mode-accent-glow);
      }

      .glass-glow {
        box-shadow: 0 0 40px -10px var(--mode-accent-glow);
      }

      .mesh-gradient {
        background: radial-gradient(circle at 50% 50%, var(--mode-accent-dim) 0%, transparent 70%);
      }

      /* Scan line animation */
      .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--primary), transparent);
        animation: scan 3s linear infinite;
      }

      @keyframes scan {
        0% { top: 0%; }
        100% { top: 100%; }
      }

      /* ===== SCROLLBAR ===== */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2D3139;
        border-radius: 10px;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2D3139;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3D4149;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes glowPulse {
        0%, 100% {
          box-shadow: 0 0 15px var(--mode-accent-glow);
        }
        50% {
          box-shadow: 0 0 25px var(--mode-accent-glow);
        }
      }

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      /* Animation Classes */
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      .animate-fade-in-scale {
        animation: fadeInScale 0.4s ease-out forwards;
      }
      .animate-slide-in-left {
        animation: slideInLeft 0.4s ease-out forwards;
      }
      .animate-slide-in-right {
        animation: slideInRight 0.4s ease-out forwards;
      }
      .animate-glow-pulse {
        animation: glowPulse 2s ease-in-out infinite;
      }

      /* Staggered animation delays */
      .animation-delay-100 { animation-delay: 100ms; }
      .animation-delay-200 { animation-delay: 200ms; }
      .animation-delay-300 { animation-delay: 300ms; }
      .animation-delay-400 { animation-delay: 400ms; }
      .animation-delay-500 { animation-delay: 500ms; }

      /* Skeleton loading shimmer */
      .skeleton-shimmer {
        background: linear-gradient(90deg,
          var(--bg-surface) 25%,
          var(--bg-elevated) 50%,
          var(--bg-surface) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      /* Gradient text - Cyan to Teal */
      .gradient-text {
        background: linear-gradient(135deg, var(--accent) 0%, var(--primary-light) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Card hover effects */
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        border-color: var(--mode-accent-glow);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px -8px var(--mode-accent-glow);
      }

      /* ===== DARK FORM SYSTEM ===== */
      .studio-select,
      .form-select {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        color: var(--text-primary);
        font-size: 13px;
        border-radius: 10px;
        padding: 8px 12px;
        transition: all 0.2s ease;
        outline: none;
      }

      .studio-select:hover,
      .form-select:hover {
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.07);
      }

      .studio-select:focus,
      .form-select:focus {
        border-color: var(--mode-accent);
        outline: none;
        box-shadow: 0 0 0 3px var(--mode-accent-dim);
        background: rgba(255, 255, 255, 0.07);
      }

      .studio-select option,
      .form-select option {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .form-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        color: var(--text-primary);
        font-size: 13px;
        border-radius: 10px;
        padding: 8px 12px;
        transition: all 0.2s ease;
        outline: none;
      }

      .form-input:hover {
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.07);
      }

      .form-input:focus {
        border-color: var(--mode-accent);
        box-shadow: 0 0 0 3px var(--mode-accent-dim);
        background: rgba(255, 255, 255, 0.07);
      }

      .form-textarea {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        color: var(--text-primary);
        font-size: 12px;
        border-radius: 10px;
        padding: 8px 12px;
        transition: all 0.2s ease;
        outline: none;
        resize: none;
      }

      .form-textarea:focus {
        border-color: var(--mode-accent);
        box-shadow: 0 0 0 3px var(--mode-accent-dim);
      }

      .form-label,
      .studio-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
      }

      .form-chip {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .form-chip:hover {
        border-color: var(--border-strong);
        background: rgba(255, 255, 255, 0.08);
      }

      .form-chip.selected {
        background: var(--mode-accent-dim);
        border-color: var(--mode-accent);
      }

      /* Studio Upload Zone - Dark Theme */
      .studio-upload-zone {
        border: 2px dashed rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        transition: all 0.2s ease;
      }

      .studio-upload-zone:hover {
        border-color: var(--mode-accent);
        background: var(--mode-accent-dim);
      }

      .studio-upload-zone.dragging {
        border-color: var(--secondary);
        background: rgba(43, 122, 158, 0.15);
      }

      /* Studio Card - Dark Theme */
      .studio-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        border-radius: 12px;
      }

      /* ===== SLIDE PANEL ANIMATIONS ===== */
      @keyframes slideInFromRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOutToRight {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      .animate-slide-in-right-panel {
        animation: slideInFromRight 0.3s ease-out forwards;
      }

      .animate-slide-out-right-panel {
        animation: slideOutToRight 0.3s ease-out forwards;
      }

      /* Gallery scroll animation for landing page */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-scroll {
        animation: scroll 25s linear infinite;
      }

      /* ===== BACKGROUND BLUR ORBS ===== */
      .bg-blur-primary {
        position: fixed;
        top: 0;
        right: 0;
        width: 500px;
        height: 500px;
        background: var(--mode-accent-dim);
        filter: blur(120px);
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
      }

      .bg-blur-secondary {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 300px;
        height: 300px;
        background: rgba(43, 122, 158, 0.08);
        filter: blur(100px);
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
      }

      /* ===== PRO UPGRADE CARD ANIMATIONS ===== */
      @keyframes pulseGlow {
        0%, 100% {
          box-shadow: 0 0 15px var(--mode-accent-glow), 0 0 30px rgba(43, 122, 158, 0.1);
        }
        50% {
          box-shadow: 0 0 25px var(--mode-accent-glow), 0 0 50px rgba(43, 122, 158, 0.2);
        }
      }

      .animate-pulse-glow {
        animation: pulseGlow 2s ease-in-out infinite;
      }

      /* Shimmer sweep effect */
      @keyframes shimmerSweep {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(200%);
        }
      }

      .animate-shimmer {
        animation: shimmerSweep 2.5s ease-in-out infinite;
      }

      /* Border pulse animation */
      @keyframes borderPulse {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.01);
        }
      }

      .animate-border-pulse {
        animation: borderPulse 2s ease-in-out infinite;
        pointer-events: none;
      }

      /* Subtle bounce for icon */
      @keyframes bounceSoft {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-2px);
        }
      }

      .animate-bounce-subtle {
        animation: bounceSoft 1.5s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>

</head>

    <div id="root"></div>
    <div class="bg-blur-primary"></div>
    <div class="bg-blur-secondary"></div>
